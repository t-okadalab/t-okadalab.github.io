<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  <meta name="google-site-verification" content="a1353mQTQfX4YpybWMGih7uoOWpXuc1O2QzduK62yQs" />
  <!-- Prevent flash of wrong language -->
  <script>
    (function(){
      if ((localStorage.getItem('lang') || 'ja') === 'ja') {
        document.documentElement.classList.add('ja-mode');
      }
    })();
  </script>
  <script src="{{ "/assets/js/lang.js" | relative_url }}" defer></script>
</head>
